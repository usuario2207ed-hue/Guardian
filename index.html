<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPI-CAM</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #ffffff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            z-index: 999999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            opacity: 1;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;         
            text-align: center;
            width: 90%;
            max-width: 500px;  
        }

        .magic-eye {
            width: 200px;    
            height: auto;
            overflow: visible;
        }

        .eye-contour {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawContour 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .eye-iris {
            fill: #0077ff; 
            opacity: 0;
            transform: scale(0);
            transform-origin: center;
            animation: fadeInIris 1.5s 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulseIris 3s 2.5s infinite ease-in-out;
            filter: drop-shadow(0 0 4px rgba(0, 119, 255, 0.6));
        }

        .eye-pupil {
            fill: #1a1a1a;
            opacity: 0;
            transform: scale(0);
            transform-origin: center;
            animation: fadeInIris 1.2s 1.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .eye-glow {
            fill: #ffffff;
            opacity: 0;
            animation: fadeIn 1s 2s forwards;
        }

        .scan-line {
            stroke: #00d2ff;
            stroke-width: 2;
            opacity: 0;
            filter: drop-shadow(0 0 6px #00d2ff);
            transform-origin: center;
            animation: scanEffect 1.5s 4.5s ease-in-out forwards;
        }

        .vision-text {
            font-size: 20px;   
            font-weight: 400;
            letter-spacing: 10px; 
            text-transform: uppercase;
            color: #1a1a1a;
            margin: 0;
            padding-left: 10px; 
            opacity: 0;
            transform: translateY(10px);
            filter: blur(4px);
            animation: textReveal 2s 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes drawContour {
            to { stroke-dashoffset: 0; }
        }

        @keyframes fadeInIris {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes pulseIris {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(0, 119, 255, 0.6)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 12px rgba(0, 119, 255, 0.9)); }
        }

        @keyframes scanEffect {
            0% { opacity: 0; transform: translateY(-15px); }
            15% { opacity: 1; }
            50% { transform: translateY(15px); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-15px); }
        }

        @keyframes textReveal {
            to {
                opacity: 0.8;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .fade-out-splash {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <svg class="magic-eye" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path class="eye-contour" d="M10,50 Q50,15 90,50 Q50,85 10,50 Z" />
                <circle class="eye-iris" cx="50" cy="50" r="18" />
                <circle class="eye-pupil" cx="50" cy="50" r="8" />
                <circle class="eye-glow" cx="45" cy="45" r="3" />
                <line class="scan-line" x1="10" y1="50" x2="90" y2="50" />
            </svg>
            <h1 class="vision-text">GUARDIAN</h1>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            setTimeout(function() {
                const splash = document.getElementById('splash-screen');
                if(splash) {
                    splash.classList.add('fade-out-splash');
                }
            }, 6000);

            setTimeout(function() {
                window.location.href = "Program/index.html";
            }, 7000);
        });

       
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registrado com sucesso:', reg.scope))
                .catch(err => console.log('Falha ao registrar o Service Worker:', err));
            });
        }
    </script>
</body>
</html>
